<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Life Tracker - Settings</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <h1 class="nav-logo">
                <span class="nav-logo-mark" aria-hidden="true">
                    <i class="fas fa-calendar-check"></i>
                    <i class="fas fa-chart-line"></i>
                </span>
                <span>Life Tracker</span>
            </h1>
            <ul class="nav-menu">
                <li class="nav-item"><a href="index.html" class="nav-link"><i class="fas fa-home"></i> Dashboard</a></li>
                <li class="nav-item"><a href="stats.html" class="nav-link"><i class="fas fa-chart-bar"></i> Statistics</a></li>
                <li class="nav-item"><a href="calendar.html" class="nav-link"><i class="fas fa-calendar-alt"></i> Calendar</a></li>
                <li class="nav-item"><a href="achievements.html" class="nav-link"><i class="fas fa-trophy"></i> Achievements</a></li>
                <li class="nav-item"><a href="milestones.html" class="nav-link"><i class="fas fa-road"></i> Milestones</a></li>
                <li class="nav-item"><a href="settings.html" class="nav-link active"><i class="fas fa-cog"></i> Settings</a></li>
            </ul>
            <button id="dark-mode-toggle"><i class="fas fa-moon"></i></button>
        </div>
    </nav>
    <div class="container">
        <h1><i class="fas fa-cog"></i> Settings</h1>
        <div class="settings-section">
            <h2><i class="fas fa-palette"></i> Appearance</h2>
            <div class="setting-item">
                <label for="theme-select">Theme:</label>
                <select id="theme-select">
                    <option value="light">Light</option>
                    <option value="dark">Dark</option>
                    <option value="auto">Auto</option>
                </select>
            </div>
        </div>
        <div class="settings-section">
            <h2><i class="fas fa-tags"></i> Categories</h2>
            <div id="categories-list"></div>
            <div class="add-category">
                <input type="text" id="new-category-input" placeholder="New category name">
                <button id="add-category-btn"><i class="fas fa-plus"></i> Add Category</button>
            </div>
        </div>
        <div class="settings-section">
            <h2><i class="fas fa-database"></i> Data Management</h2>
            <button id="export-data-btn" class="btn-secondary"><i class="fas fa-download"></i> Export Data</button>
            <button id="import-data-btn" class="btn-secondary"><i class="fas fa-upload"></i> Import Data</button>
            <button id="clear-data-btn" class="btn-danger"><i class="fas fa-trash"></i> Clear All Data</button>
        </div>
        <div class="settings-section">
            <h2><i class="fas fa-bell"></i> Notifications</h2>
            <div class="setting-item">
                <label for="reminder-toggle">Daily Reminders:</label>
                <input type="checkbox" id="reminder-toggle">
            </div>
            <div class="setting-item">
                <label for="reminder-time">Reminder Time:</label>
                <input type="time" id="reminder-time" value="09:00">
            </div>
        </div>
    </div>
    <script src="settings.js"></script>
</body>
</html>
