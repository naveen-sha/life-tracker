<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Life Tracker - Calendar</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <h1 class="nav-logo">
                <span class="nav-logo-mark" aria-hidden="true">
                    <i class="fas fa-calendar-check"></i>
                    <i class="fas fa-chart-line"></i>
                </span>
                <span>Life Tracker</span>
            </h1>
            <ul class="nav-menu">
                <li class="nav-item"><a href="index.html" class="nav-link"><i class="fas fa-home"></i> Dashboard</a></li>
                <li class="nav-item"><a href="stats.html" class="nav-link"><i class="fas fa-chart-bar"></i> Statistics</a></li>
                <li class="nav-item"><a href="calendar.html" class="nav-link active"><i class="fas fa-calendar-alt"></i> Calendar</a></li>
                <li class="nav-item"><a href="achievements.html" class="nav-link"><i class="fas fa-trophy"></i> Achievements</a></li>
                <li class="nav-item"><a href="milestones.html" class="nav-link"><i class="fas fa-road"></i> Milestones</a></li>
                <li class="nav-item"><a href="settings.html" class="nav-link"><i class="fas fa-cog"></i> Settings</a></li>
            </ul>
            <button id="dark-mode-toggle"><i class="fas fa-moon"></i></button>
        </div>
    </nav>
    <div class="container">
        <h1><i class="fas fa-calendar-alt"></i> Habit Calendar</h1>
        <div class="calendar-controls">
            <button id="prev-month"><i class="fas fa-chevron-left"></i></button>
            <h2 id="current-month">April 2026</h2>
            <button id="next-month"><i class="fas fa-chevron-right"></i></button>
        </div>
        <div class="calendar-grid">
            <div class="day-header">Sun</div>
            <div class="day-header">Mon</div>
            <div class="day-header">Tue</div>
            <div class="day-header">Wed</div>
            <div class="day-header">Thu</div>
            <div class="day-header">Fri</div>
            <div class="day-header">Sat</div>
        </div>
        <div id="calendar-days" class="calendar-grid"></div>
        <div class="legend">
            <div class="legend-item">
                <div class="legend-color completed"></div>
                <span>All habits completed</span>
            </div>
            <div class="legend-item">
                <div class="legend-color partial"></div>
                <span>Some habits completed</span>
            </div>
            <div class="legend-item">
                <div class="legend-color none"></div>
                <span>No habits completed</span>
            </div>
        </div>
    </div>
    <footer class="site-footer">
        <p>&copy; 2026 Life Tracker. All rights reserved.</p>
    </footer>
    <script src="app-storage.js"></script>
    <script src="calendar.js"></script>
</body>
</html>
